{% extends "layout.html" %}

{% block title %} People {% endblock %}

{% block content %}
<div class="container mt-4">

    <h1 id="title" class="mb-3"></h1>

    <div class="row">
        <div class="col-md-3">
            <div id="image"></div>
        </div>
        <div class="col-md-9">
            <div id="author" class="text-muted"></div>
            <div id="year" class="text-muted"></div>
            <div id="score"></div>
            <div id="summary" class="mt-3"></div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col">
            <div id="categories"></div>
            <div id="sub-categories"></div>
        </div>
        <div class="col">
            <div id="awards"></div>
        </div>
        <div class="row">
            <div class="col" id="similar-0"></div>
            <div class="col" id="similar-1"></div>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
    const books = {{ data | tojson }};
    const bookId = {{ id }};
</script>
<script src="/static/detail.js"></script>
{% endblock %}
